        <label for="porte">Porte do cão:

        <input type="radio" name="porte" id="md">
        <label for="md">Médio</label>

        <input type="radio" name="porte" id="gd">

        <label for="">Selecione um opção:</label>

            <option value="3">3</option>
        </select>
    </p>

    <label for="">Observações:</label>
    <textarea name="" id="" cols="30" rows="5" placeholder="Informaçoes extras..."></textarea>

    <input type="checkbox" name="" id=""><label for="">Item 2</label>
    <input type="checkbox" name="" id=""><label for="">Item 3</label>
    </div>

    </fieldset>

</form>
