<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Organizado</title>

    <link rel="stylesheet" href="form_org_style.css">

</head>
<body>
    <a href="../index.html">Voltar</a>
    <h1>Dados da conta</h1>

    <hr>
    <br>

    <img src="../bloco_10/form1_back.jpg" alt="formulário">

    <fieldset>
        <legend>Dados Pessoais:</legend>

        <br>

        <form action="form_org.html" method="post">
            <div>
                <label for="nome">Nome:</label>
                <input type="text" name="nome" id="nome" size="60">
            </div>
                <br>
            <div>
                <label for="email">E-mail:</label>
                <input type="text" name="email" id="email" size="60">
            </div>
        </form>
    </fieldset>

    <fieldset>
        <legend>Dados da Conta</legend>

        <br>

        <form action="form_org.html" method="post">
            <div>
                <label for="senha">Senha:</label>
                <input type="text" name="senha" id="senha" size="60">
            </div>
                <br>
            <div>
                <label for="frase">Frase opcional:</label>
                <textarea rowspan="3" name="" id="" cols="50" rows="2"></textarea>
            </div>
        </form>
    </fieldset>
    <input type="submit" name="" id="">
    
</body>
</html>
